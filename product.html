<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIENS Z | Product</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<div class="logo">

<img src="logo.png">

<span>LIENS Z</span>

</div>

</header>

<section class="product-page">

<div class="product-gallery">

    <img id="main-image" src="" alt="" class="main-image">

    <div class="thumbnail-gallery">

        <img id="thumb1" class="thumbnail active" src="" alt="">

        <img id="thumb2" class="thumbnail" src="" alt="">

        <img id="thumb3" class="thumbnail" src="" alt="">

        <img id="thumb4" class="thumbnail" src="" alt="">

    </div>

</div>

<div class="product-info">

<h1 id="product-name"></h1>

<div class="stars">
★★★★★
</div>

<h2 id="product-price"></h2>
<div class="product-options">

<h3>🎨 Color</h3>

<div class="colors">

<button class="color-btn active" style="background:black;"></button>

<button class="color-btn" style="background:silver;"></button>

<button class="color-btn" style="background:#1e88e5;"></button>

<button class="color-btn" style="background:#d4af37;"></button>

</div>

<h3>💾 Storage</h3>

<div class="storage">

<button class="storage-btn active">128GB</button>

<button class="storage-btn">256GB</button>

<button class="storage-btn">512GB</button>

</div>

</div>
<p id="product-description"></p>

<button id="add-cart" class="buy-btn">

🛒 Add To Cart

</button>

</div>

</section>

<script src="product.js"></script>

</body>

</html>
